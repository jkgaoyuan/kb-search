version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: gunicorn -c gunicorn.conf.py app.main:app
    volumes:
      - /tmp/kb-uploads:/tmp/uploads
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://kb:kb@db:5432/kb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY:-changeme}
      - MAX_UPLOAD_SIZE=20971520
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A app.tasks.document_tasks worker --loglevel=info --concurrency=2
    volumes:
      - /tmp/kb-uploads:/tmp/uploads
    environment:
      - DATABASE_URL=postgresql://kb:kb@db:5432/kb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY:-changeme}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A app.tasks.document_tasks beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    volumes:
      - celery_beat_data:/tmp/celerybeat
    environment:
      - DATABASE_URL=postgresql://kb:kb@db:5432/kb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY:-changeme}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=kb
      - POSTGRES_PASSWORD=kb
      - POSTGRES_DB=kb
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=100
      -c effective_cache_size=512MB
      -c work_mem=4MB
    volumes:
      - pg_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb -d kb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --save "60 1"
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  celery_beat_data:
